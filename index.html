<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen con Temporizador</title>
<style>
body {font-family: Arial;background:#e3f2fd;display:flex;justify-content:center;align-items:center;height:100vh;}
.container {background:white;padding:20px;border-radius:10px;width:420px;text-align:center;}
button {margin-top:10px;padding:10px;width:100%;background:#1565c0;color:white;border:none;border-radius:5px;}
#timer {font-weight:bold;color:#d32f2f;}
</style>
</head>
<body>

<div class="container" id="registro">
    <h2>Registro</h2>
    <input type="text" id="nombre" placeholder="Nombre"><br>
    <input type="text" id="cuenta" placeholder="Número de cuenta"><br>
    <button onclick="iniciarExamen()">Iniciar</button>
</div>

<div class="container" id="examen" style="display:none;">
    <h3 id="pregunta"></h3>
    <div id="opciones"></div>
    <p>Tiempo restante: <span id="timer">01:05</span></p>
    <button onclick="siguientePregunta()">Siguiente</button>
</div>

<script>

// ===== APIs =====
const API_ALUMNOS = "https://sheetdb.io/api/v1/zpplpv67yt6uz";
const API_RESULTADOS = "https://sheetdb.io/api/v1/pyjo72s7rlaw9";

// ===== PREGUNTAS =====
let preguntas = [];
for(let i=1;i<=120;i++){
    preguntas.push({
        texto: `Pregunta ${i}: Selecciona la opción correcta`,
        opciones: ["A", "B", "C", "D"],
        correcta: Math.floor(Math.random()*4)
    });
}

let actual = 0;
let tiempo = 65;
let intervalo;
let respuestasCorrectas = 0;

// ===== INICIO =====
async function iniciarExamen() {
    let nombre = document.getElementById("nombre").value.trim();
    let cuenta = document.getElementById("cuenta").value.trim();

    if(nombre === "" || cuenta === ""){
        alert("Completa todos los campos");
        return;
    }

    try {
        let res = await fetch(API_ALUMNOS);
        let alumnos = await res.json();

        let autorizado = alumnos.some(alumno => 
            alumno.nombre?.toLowerCase() === nombre.toLowerCase() && alumno.cuenta === cuenta
        );

        if(!autorizado){
            alert("No estás registrado para presentar el examen");
            return;
        }

    } catch(error){
        alert("Error al conectar con la base de datos");
        return;
    }

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("cuenta", cuenta);

    document.getElementById("registro").style.display = "none";
    document.getElementById("examen").style.display = "block";
    cargarPregunta();
}

// ===== PREGUNTAS =====
function cargarPregunta() {
    let p = preguntas[actual];
    document.getElementById("pregunta").textContent = p.texto;
    let opcionesHTML = "";

    p.opciones.forEach((op, i) => {
        opcionesHTML += `<label><input type="radio" name="opcion" value="${i}"> ${op}</label><br>`;
    });

    document.getElementById("opciones").innerHTML = opcionesHTML;
    iniciarTimer();
}

// ===== TIMER =====
function iniciarTimer() {
    tiempo = 65;
    actualizarTimer();
    clearInterval(intervalo);

    intervalo = setInterval(() => {
        tiempo--;
        actualizarTimer();

        if (tiempo <= 0) {
            siguientePregunta();
        }
    }, 1000);
}

function actualizarTimer() {
    let min = Math.floor(tiempo / 60);
    let seg = tiempo % 60;
    document.getElementById("timer").textContent =
        `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
}

// ===== SIGUIENTE =====
function siguientePregunta() {
    clearInterval(intervalo);

    let seleccion = document.querySelector('input[name="opcion"]:checked');
    if(seleccion){
        if(parseInt(seleccion.value) === preguntas[actual].correcta){
            respuestasCorrectas++;
        }
    }

    actual++;

    if (actual < preguntas.length) {
        cargarPregunta();
    } else {
        finalizarExamen();
    }
}

// ===== GUARDAR RESULTADOS =====
function guardarDatos(nombre, cuenta, calificacion) {
    fetch(API_RESULTADOS, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            data: {
                nombre: nombre,
                cuenta: cuenta,
                examen: "Examen 1",
                calificacion: calificacion,
                fecha: new Date().toLocaleString()
            }
        })
    });
}

// ===== FINAL =====
function finalizarExamen(){
    let nombre = localStorage.getItem("nombre");
    let cuenta = localStorage.getItem("cuenta");

    let calificacion = Math.round((respuestasCorrectas / preguntas.length) * 100);

    guardarDatos(nombre, cuenta, calificacion);

    alert("Examen terminado. Calificación: " + calificacion);
    location.reload();
}

</script>

</body>
</html>
